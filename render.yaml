databases:
  - name: weatherapp-db
    plan: free
    databaseName: weatherapp
    user: weatherapp

services:
  - type: web
    name: weatherapp
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: python -m gunicorn WeatherApp.asgi:application -k uvicorn.workers.UvicornWorker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weatherapp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: 4
      - key: DEBUG
        value: false
      - key: OPENWEATHERMAP_API_KEY
        sync: false
      - key: OPENWEATHERMAP_DEFAULT_CITY
        value: Berlin
      - key: OPENWEATHERMAP_DEFAULT_UNITS
        value: metric